#welcome {

  min-height: 60vh;
  padding: 24px 20px;
  text-align: center;
  gap: 16px;

.sun-hero {
  width: 64px;

  align-items: center;
  justify-content: center;
  box-shadow: 0 0 32px var(--sun-glow);
  margin-bottom: 8px;
}
.sun-hero svg {
  width: 32px;
  height: 32px;

/* ── CHAT BALLOONS ── */
.msg-group {

}

  justify-content: flex-end;

}

.markdown-payload p {

}

}
.copy-code-btn {

  border: none;

  align-items: center;
  gap: 4px;

}
.copy-code-btn:hover {
  color: var(--text);
}
.markdown-payload pre {
  padding: 14px;
  overflow-x: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;

  color: #ECECEF;
}

.img-preview {

/* Streaming Loader Dots */
.typing {

  gap: 6px;
  align-items: center;
  padding: 8px 4px;
}
.dot {
  width: 7px;
  height: 7px;
  background: var(--muted);
  border-radius: 50%;
  animation: bop 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bop {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ── FLOATING ATTACHMENT ACTION STRIP ── */
#attach-bar {
  display: none;
  padding: 8px 20px 0;
  animation: slideDown 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideDown {
  from { transform: translateY(-10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.attach-chip {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 14px;
  max-width: 100%;
}
.attach-chip img {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  object-fit: cover;
  border: 1px solid var(--border);
}
.attach-chip .file-icon {
  width: 40px;
  height: 40px;
  background: rgba(255, 107, 0, 0.1);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255, 107, 0, 0.15);
}
.attach-chip .file-icon svg {
  width: 20px;
  height: 20px;
  stroke: var(--sun);
  fill: none;
  stroke-width: 2;
}
.attach-chip .attach-info {
  flex: 1;
  min-width: 0;
}
.attach-chip .attach-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}
.attach-chip .attach-type {
  font-size: 11px;
  color: var(--subtle);
}
.attach-chip .remove-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--s2);
  border: none;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  transition: var(--transition);
}
.attach-chip .remove-btn:hover {
  background: var(--s3);
  color: var(--text);
}

/* ── INPUT SYSTEM ── */
.input-area {
  padding: 10px 20px 24px;
  flex-shrink: 0;
}
.input-box {
  background: var(--s1);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition: var(--transition);
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}
.input-box:focus-within {
  border-color: var(--border-active);
  box-shadow: 0 4px 24px rgba(255, 107, 0, 0.08);
}
.input-top {
  display: flex;
  align-items: flex-end;
  padding: 12px 14px;
  gap: 12px;
}
textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  resize: none;
  max-height: 140px;
  min-height: 24px;
  line-height: 1.5;
  padding: 0;
}
textarea::placeholder {
  color: var(--subtle);
}
.send-btn {
  width: 36px;
  height: 36px;
  background: var(--sun);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: var(--transition);
  box-shadow: 0 0 10px var(--sun-glow);
}
.send-btn:hover {
  background: var(--sun-light);
  transform: scale(1.05);
}
.send-btn:disabled {
  opacity: 0.25;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.send-btn svg {
  width: 16px;
  height: 16px;
  stroke: white;
  fill: none;
  stroke-width: 2.5;
}
.input-bottom {
  display: flex;
  align-items: center;
  padding: 0 12px 12px;
  gap: 6px;
}
.att-btn {
  width: 34px;
  height: 34px;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: var(--transition);
  color: var(--muted);
}
.att-btn:hover {
  background: var(--s2);
  color: var(--text);
}
.att-btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}
.input-hint {
  flex: 1;
  text-align: right;
  font-size: 11px;
  color: var(--subtle);
  padding-right: 6px;
}
input[type=file] {
  display: none;
}

/* ── DAILY USAGE PANEL INDICATORS ── */
.usage-strip {
  padding: 8px 20px 4px;
  display: none;
}
.usage-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(24, 24, 27, 0.5);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 12px;
}
.usage-label {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.ubar {
  flex: 1;
  height: 4px;
  background: var(--s2);
  border-radius: 4px;
  overflow: hidden;
}
.ubar-fill {
  height: 100%;
  background: var(--sun);
  border-radius: 4px;
  transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.ubar-fill.warn {
  background: var(--red);
}
.usage-num {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
}
.up-chip {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 8px;
  background: rgba(255, 107, 0, 0.15);
  color: var(--sun-light);
  border: 1px solid rgba(255, 107, 0, 0.2);
  cursor: pointer;
  white-space: nowrap;
  font-weight: 600;
  transition: var(--transition);
}
.up-chip:hover {
  background: var(--sun);
  color: white;
}

/* ── DIALOG OVERLAY SYSTEM ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
